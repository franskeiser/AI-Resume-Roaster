# =====================================================================
# PRODUCTION PROFILE (activated with SPRING_PROFILES_ACTIVE=prod)
# Used for the Railway deployment. Overrides the H2/local defaults in
# application.properties. All secrets come from environment variables.
# =====================================================================

# --- Server ---
# Railway injects the port the container must listen on via $PORT.
server.port=${PORT:8080}

# --- PostgreSQL datasource (values injected as env vars on Railway) ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable the H2 console in production.
spring.h2.console.enabled=false

# --- Tesseract OCR ---
# Path is set by the Docker image (symlinked to the installed tessdata dir).
tesseract.data.path=${TESSERACT_DATA_PATH:/tessdata}

# --- Google Gemini ---
gemini.api.key=${GEMINI_API_KEY}
# Override the model from the dashboard if one is overloaded, e.g. gemini-2.0-flash
gemini.model=${GEMINI_MODEL:gemini-flash-latest}

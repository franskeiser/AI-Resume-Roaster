# Application Name
spring.application.name=resume-roaster

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================
# DATABASE CONFIGURATION
# ===================================

# H2 In-Memory Database (For Local Development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL (For Production - Uncomment and configure)
# spring.datasource.url=jdbc:postgresql://localhost:5432/resume_roaster
# spring.datasource.username=${DB_USERNAME:postgres}
# spring.datasource.password=${DB_PASSWORD:password}
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Tesseract OCR Path (Windows)
tesseract.data.path=C:/Program Files/Tesseract-OCR

# ===================================
# API KEYS (NEVER COMMIT REAL KEYS)
# ===================================

# Google Gemini API Key
# Get your key from: https://aistudio.google.com/app/apikey
gemini.api.key=${GEMINI_API_KEY:your_api_key_here}
